name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      # Base path MUST match the repo name (site is served at /<repo>/).
      # Auto-detect it so this can never drift out of sync again.
      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_BASE_URL: /${{ github.event.repository.name }}
          # Optional: set a GOOGLE_CLIENT_ID repo variable to enable real
          # Google sign-in (see in-app Dokumentacioni → "Për zhvilluesit").
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          # Optional: Supabase project (repo variables) to make listings shared
          # across all users (Dokumentacioni → "Shpallje të përbashkëta").
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      # SPA fallback for deep links / refresh, and disable Jekyll.
      - name: Add SPA fallback + .nojekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
